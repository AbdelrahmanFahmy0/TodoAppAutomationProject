name: Todo App CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  schedule:
    - cron: '00 21 * * *'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Test platform to run'
        required: true
        default: 'android'
        type: choice
        options:
          - android
          - ios

env:
  JAVA_VERSION: '21'
  JAVA_DISTRIBUTION: 'oracle'
  NODE_VERSION: '24'
  MAVEN_VERSION: '3.9.15'
  ANDROID_DEVICE: 'Pixel 9'
  IOS_DEVICE: 'iPhone 16'
  TARGET: "%regex[.*Tests.*],com.todo.**.**,com.todo.**"

jobs:
  # ──────────────────────────────────────────────────────
  # Android Tests — requires emulator
  # ──────────────────────────────────────────────────────
  Android-Tests:
    name: Android Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'android' || inputs.platform == 'regression')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: 🔧 Setup Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: ${{ env.MAVEN_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📱 Install Appium 2 + UiAutomator2 driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2
          appium --version

      - name: 🤖 Enable KVM for hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          if [ -e /dev/kvm ]; then
            echo "✅ KVM is available"
          else
            echo "⚠️ KVM not available — emulator will run slower"
          fi

      - name: 📱 Start Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: ${{ env.ANDROID_DEVICE }}
          avd-name: test-emulator
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb wait-for-device
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            echo "✅ Emulator is ready"

      - name: 🧪 Running Tests
        continue-on-error: true
        run: mvn -Dtest="${TARGET}" clean test

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Allure_Report_Android
          path: "test-output/reports/*.html"

  # ──────────────────────────────────────────────────────
  # iOS Tests — macOS only
  # ──────────────────────────────────────────────────────
  IOS-Tests:
    name: IOS Tests
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' && (inputs.platform == 'ios' || inputs.platform == 'regression')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v6

      - name: ☕ Setup Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}

      - name: 🔧 Setup Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: ${{ env.MAVEN_VERSION }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 📱 Install Appium 2 + XCUITest driver
        run: |
          npm install -g appium@latest
          appium driver install xcuitest
          appium --version

      - name: 🍎 Boot iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "${{ env.IOS_DEVICE }}" | head -1 | grep -E -o '[0-9A-F-]{36}')
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID" || true
          xcrun simctl list devices | grep Booted

      - name: 🧪 Running Tests
        continue-on-error: true
        run: mvn -Dtest="${TARGET}" clean test

      - name: 📊 Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: Allure_Report_IOS
          path: "test-output/reports/*.html"